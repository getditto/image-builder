name: Build and Publish AMI

on:
   push:
      branches:
         - main
         - ore/ditto-image-builder
   workflow_dispatch:
      inputs:
         k8s_version:
            description: "Specify the Kubernetes version"
            required: false
            default: "1.31.4"
            options:
               - "1.31.4"

env:
  ARGOCD_ENDPOINTS: "argocd.ops.k8s.ditto.live"
  ARGOCD_TOKENS: "${{ secrets.ARGOCD_AUTH_TOKEN }}"
  AWS_REGION: "us-east-2"
  ACCOUNT_ID: "261908217831"
  ROLE: "image-builder-runner"
  AWS_OUTPUT: "json"


permissions:
  id-token: write   # This is crucial for OIDC authentication
  contents: read    # Allows reading repository contents

jobs:
  cleanup-outdated-ami:
    name: Cleanup Outdated AMI
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x argocd
          sudo mv argocd /usr/local/bin/
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale version

      - name: Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci,tag:github-actions,tag:repo-getditto-cloud-infra-ops,tag:use2-ops-int-dittolive-app,tag:usw2-ops-int-dittolive-app,tag:valet-vpc

      - name: Get live Kubernetes versions from ArgoCD
        id: versions
        run: |
          IFS=',' read -ra ENDPOINTS <<< "$ARGOCD_ENDPOINTS"
          IFS=',' read -ra TOKENS <<< "$ARGOCD_TOKENS"

          versions=()
          for i in "${!ENDPOINTS[@]}"; do
            endpoint="${ENDPOINTS[$i]}"
            token="${TOKENS[$i]}"
            echo "🔍 Checking clusters on $endpoint"
            v=$(argocd --server "$endpoint" --auth-token "$token" --grpc-web cluster list -ojson \
              | jq -r '[.[].serverVersion | select(. != null)] | min')

            echo "$endpoint live version: $v"
            versions+=("$v")
          done

          # Save min version to output
          min_version=$(printf '%s\n' "${versions[@]}" | sort -V | head -n1)
          echo "Live minimum K8s version: $min_version"
          echo "min_k8s_version=$min_version" >> $GITHUB_OUTPUT

      - name: Assume AWS role with OIDC
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: "arn:aws:iam::${{ env.ACCOUNT_ID }}:role/${{ env.ROLE }}"

      - name: Clean up old public AMIs
        run: |
          LIVE_VERSION="${{ steps.versions.outputs.min_k8s_version }}"
          REGIONS="eu-west-3 eu-west-2 eu-west-1 ca-central-1 eu-central-1 us-east-1 us-east-2 us-west-1 us-west-2 ap-southeast-2"

          echo "Looking for public AMIs with kubernetes_version less than $LIVE_VERSION and name containing 'capa-ami-ubuntu-24.04' in regions: $REGIONS"

          for REGION in $REGIONS; do
            echo "🔎 Checking region: $REGION"
            AMI_IDS=$(aws ec2 describe-images \
              --owners "${{ env.ACCOUNT_ID }}" \
              --filters "Name=tag:kubernetes_version,Values=*" \
              --region "$REGION" \
              --query "Images[?Public==\`true\`].{ID:ImageId,Version:Tags[?Key=='kubernetes_version']|[0].Value}" \
              --output json | jq -r '.[] | [.ID, .Version] | @tsv' | awk -v live="$LIVE_VERSION" '$2 < live { print $1 }')

            if [ -z "$AMI_IDS" ]; then
              echo "✅ No outdated public AMIs found in $REGION. Skipping."
              continue
            fi

            for ami in $AMI_IDS; do
              echo "🧹 Deregistering public AMI: $ami (older than $LIVE_VERSION) in $REGION"
              echo "Making public access to AMI: $ami in $REGION private"
              aws ec2 modify-image-attribute --image-id "$ami" --region "$REGION" --launch-permission "Remove=[{Group=all}]"
            done
          done

  build-ami:
    name: Build and Publish AMI
    runs-on: ubuntu-latest
    env:
      AWS_REGION: "us-east-2"
      ACCOUNT_ID: "261908217831"
      ROLE: "image-builder-runner"
      AWS_OUTPUT: "json"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up AWS
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: "arn:aws:iam::${{ env.ACCOUNT_ID }}:role/${{ env.ROLE }}"
          role-session-name: image-builder@build-cluster-api-images=${{ github.run_id }}
          role-duration-seconds: 3600

      - name: Setup Packer
        uses: hashicorp/setup-packer@main
        with:
          version: "latest"

      - name: Install Packer Amazon Plugin
        run: |
          packer plugins install github.com/hashicorp/amazon

      - name: Validate Packer template
        run: |
          packer init -upgrade ./images/capi/packer/config.pkr.hcl 
          make validate-ami-ubuntu-2404

      - name: Build AMI
        env:
          AWS_PROFILE: ditto-prod-primary
          K8S_VERSION: ${{ github.event.inputs.k8s_version || '1.30.10' }}
        run: |
          AWS_REGION=${{ env.AWS_REGION }} \
          ./images/capi/update_k8s_version.sh && \
          make build-ami-ubuntu-2404

      - name: Make AMI Public
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          ./images/capi/make_ami_public.sh
